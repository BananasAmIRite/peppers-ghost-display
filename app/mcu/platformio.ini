; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc1-n8r8
framework = arduino
lib_deps = 
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit BusIO@^1.17.4
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	adafruit/Adafruit SPIFlash@^5.1.1
	adafruit/SdFat - Adafruit Fork@^2.3.103
	adafruit/Adafruit ImageReader Library@^2.10.0
	adafruit/Adafruit HX8357 Library@^1.1.20
	hideakitai/ESP32DMASPI@^0.8.0
upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D ARDUINO_USB_MODE=1
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DCONFIG_SPIRAM_BOOT_INIT=1
	-DCONFIG_SPIRAM_FETCH_INSTRUCTIONS=1
	-DCONFIG_SPIRAM_RODATA=1
	-DCONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY=1
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
